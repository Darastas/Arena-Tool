# 服务端配置文件示例 - 复制为 config.yaml 后填写真实值
server:
  host: "0.0.0.0"
  port: 8848
  # 上传鉴权 token（手机端 AutoJs 脚本 config.js 中要保持一致）
  auth_token: "请改成一个随机长字符串_至少32位_例如c8a9f2..."
  # 上传图片保存目录（相对路径基于 server/ 目录）
  upload_dir: "uploads"
  # OCR 结果与日志保存目录
  log_dir: "logs"
  # 单图最大字节数（防滥用）
  max_image_bytes: 8388608   # 8MB

ocr:
  # 是否使用子进程跑 OCR（强烈建议 true，用完即释放内存）
  subprocess_mode: true
  # OCR 超时（秒）
  timeout: 90
  # 输入图最大宽度（自动等比缩放，省内存）
  max_width: 1280

matcher:
  # 模糊匹配最大编辑距离（越小越严格）
  max_edit_distance: 2
  # 价格识别正则（暗区一般纯数字，可能含逗号）
  price_regex: '(\d{1,3}(?:[,，]\d{3})+|\d{4,8})'

smtp:
  host: "smtp.qq.com"
  port: 465
  use_ssl: true
  username: "你的发件邮箱@qq.com"
  password: "邮箱授权码_不是登录密码"
  from_addr: "你的发件邮箱@qq.com"
  to_addrs:
    - "你的收件邮箱@example.com"
  subject_prefix: "[暗区商店]"
  # 是否在邮件中附上原始截图（流量稍大但更直观）
  attach_image: true
